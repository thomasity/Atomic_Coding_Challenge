name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pylint pytest

      - name: Lint
        run: pylint sdks/python/ai.py sdks/python/client.py --fail-under=7.0

      - name: Unit tests
        run: pytest sdks/python/test.py
